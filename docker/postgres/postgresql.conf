# PostgreSQL Configuration for APIVault
# Tuned for 8GB RAM system (see docs/13_INFRASTRUCTURE.md)

# Memory
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 256MB
maintenance_work_mem = 512MB

# Parallelism
max_parallel_workers_per_gather = 2
max_worker_processes = 8
max_parallel_workers = 4

# WAL
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Connections
max_connections = 100

# Logging
log_statement = 'ddl'
log_min_duration_statement = 1000
log_lock_waits = on
log_temp_files = 0

# pgvector
vectorize.enable = on
