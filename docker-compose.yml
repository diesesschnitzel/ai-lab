# APIVault Docker Compose Configuration
# See docs/13_INFRASTRUCTURE.md for details

services:

  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: apivault
      POSTGRES_USER: apivault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apivault"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://apivault:${POSTGRES_PASSWORD}@db:5432/apivault
      ADMIN_KEY: ${ADMIN_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://apivault:${POSTGRES_PASSWORD}@db:5432/apivault
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://apivault:${POSTGRES_PASSWORD}@db:5432/apivault
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      BOOTSTRAP_ON_EMPTY_DB: ${BOOTSTRAP_ON_EMPTY_DB:-true}
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    profiles:
      - local-llm

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  pgdata:
  ollamadata:
  prometheusdata:
  grafanadata:
